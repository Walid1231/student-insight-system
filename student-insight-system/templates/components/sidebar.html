<aside class="sidebar" id="sidebar" role="navigation" aria-label="Main navigation">

            <span>Log Out</span> </a> </div>
</aside>
<script>    /* ── Theme Manager ─────────────────────────────────────────── */    const ThemeManager = { STORAGE_KEY: 'theme_preference', init() { this.apply(localStorage.getItem(this.STORAGE_KEY) || 'light'); window.matchMedia?.('(prefers-color-scheme: dark)').addEventListener('change', () => { if (localStorage.getItem(this.STORAGE_KEY) === 'system') this.apply('system'); }); }, setTheme(v) { localStorage.setItem(this.STORAGE_KEY, v); this.apply(v); }, apply(pref) { const dark = pref === 'system' ? window.matchMedia?.('(prefers-color-scheme: dark)').matches : pref === 'dark'; document.documentElement[dark ? 'setAttribute' : 'removeAttribute']('data-theme', 'dark'); const sel = document.getElementById('themeSelect'); if (sel) sel.value = pref; }, getCurrent() { return localStorage.getItem(this.STORAGE_KEY) || 'light'; } }; ThemeManager.init();    /* ── Sidebar collapse (flex-child width drives the push) ───── */    (function () { const html = document.documentElement; const btn = document.getElementById('sidebarToggle'); if (!btn || btn.dataset.init) return; btn.dataset.init = '1';        /* Restore persisted state before transitions activate */        const collapsed = localStorage.getItem('sidebarCollapsed') === 'true'; if (collapsed) html.classList.add('sidebar-is-collapsed'); btn.addEventListener('click', () => { const now = html.classList.toggle('sidebar-is-collapsed'); localStorage.setItem('sidebarCollapsed', now); document.cookie = `sidebar_collapsed=${now}; path=/; max-age=31536000`; }); })();    /* ── Anti-flicker: suppress transitions on first paint ──────── */    document.body.classList.add('preload'); requestAnimationFrame(() => requestAnimationFrame(() => document.body.classList.remove('preload')));    /* ── Mobile sidebar ─────────────────────────────────────────── */    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('active'); } document.addEventListener('click', e => { const sb = document.getElementById('sidebar'); const mb = document.querySelector('.mobile-toggle'); if (window.innerWidth <= 768 && sb?.classList.contains('active')) { if (!sb.contains(e.target) && !mb?.contains(e.target)) sb.classList.remove('active'); } });    /* ── Client-side navigation (no page blink) ─────────────────── */    function syncStylesheets(doc) { const cur = new Set(Array.from(document.querySelectorAll('link[rel="stylesheet"]')).map(l => l.getAttribute('href')?.split('?')[0])); doc.querySelectorAll('link[rel="stylesheet"]').forEach(nl => { const base = nl.getAttribute('href')?.split('?')[0]; if (base && !cur.has(base)) { const lk = document.createElement('link'); lk.rel = 'stylesheet'; lk.href = nl.getAttribute('href'); document.head.appendChild(lk); } }); } document.addEventListener('click', e => { const link = e.target.closest('a.nav-link'); if (!link || link.classList.contains('logout-link')) return; e.preventDefault(); const url = link.href; document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active')); link.classList.add('active'); fetch(url).then(r => { if (r.status === 401 || r.status === 403) { window.location.href = '/logout'; return null; } return r.text(); }).then(html => { if (!html) return; const doc = new DOMParser().parseFromString(html, 'text/html'); const nmc = doc.querySelector('.main-content'); const omc = document.querySelector('.main-content'); if (!nmc || !omc) return; syncStylesheets(doc); omc.innerHTML = nmc.innerHTML; omc.querySelectorAll('script').forEach(os => { const ns = document.createElement('script');[...os.attributes].forEach(a => ns.setAttribute(a.name, a.value)); ns.textContent = os.textContent; os.parentNode.replaceChild(ns, os); }); const nt = doc.querySelector('title'); if (nt) document.title = nt.textContent; history.pushState({}, '', url); window.scrollTo(0, 0); if (typeof initStudentDashboardCharts === 'function') initStudentDashboardCharts(); }).catch(() => window.location.href = url); }); window.addEventListener('popstate', () => location.reload()); function logout() { window.location.href = "{{ url_for('auth.logout') }}"; }</script>
